<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Post - MaxOnu 2026</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="images/logo-maxonu.png" type="image/png">
    <script src="js/includes.js?v=20260420-headerfix"></script>
    <script src="js/create-post.js" defer></script>
</head>
<body>
    <include src="header.html"></include>

    <main class="main-content" id="main-content">
        <section class="content-section">
            <div class="dashboard-container">
                <section class="dashboard-hero">
                    <div class="dashboard-hero-copy">
                        <span class="dashboard-kicker">Publicação</span>
                        <h1>Novo post</h1>
                        <p id="postAccessMessage">Verificando permissão para criação de posts...</p>
                    </div>
                    <div class="dashboard-hero-badge">Blog</div>
                </section>

                <section class="dashboard-panel create-post-panel">
                    <div class="dashboard-section-heading">
                        <span class="dashboard-section-kicker">Editor</span>
                        <h2>Monte a publicação</h2>
                        <p>Crie um comunicado, aviso ou atualização pública da MaxOnu 2026.</p>
                    </div>

                    <form id="createPostForm" class="dashboard-form" hidden>
                        <div class="create-post-layout">
                            <div class="create-post-main">
                                <div class="form-group create-post-title-group">
                                    <label for="postTitle">Título</label>
                                    <input type="text" id="postTitle" placeholder="Ex: Comunicado oficial sobre os comitês" required>
                                </div>
                                <div class="form-group">
                                    <label for="postContent">Conteúdo</label>
                                    <textarea id="postContent" class="post-editor-textarea" placeholder="Escreva a publicação com contexto, instruções e próximos passos..." required></textarea>
                                </div>
                            </div>
                            <aside class="create-post-side">
                                <div class="create-post-side-card">
                                    <span class="dashboard-chip">Resumo</span>
                                    <div class="form-group">
                                        <label for="postExcerpt">Resumo curto</label>
                                        <input type="text" id="postExcerpt" placeholder="Texto breve para o card do blog">
                                    </div>
                                </div>
                                <div class="create-post-side-card create-post-upload-card">
                                    <span class="dashboard-chip">Capa opcional</span>
                                    <div class="form-group">
                                        <label for="postImage">Imagem opcional</label>
                                        <input type="file" id="postImage" accept="image/*">
                                        <p class="form-help">Adicione uma imagem para destacar a publicação. Não é obrigatório.</p>
                                        <img id="postImagePreview" class="post-image-preview" alt="Pré-visualização da imagem" hidden>
                                    </div>
                                </div>
                            </aside>
                        </div>
                        <div class="create-post-actions">
                            <button type="submit" class="view-button">Publicar post</button>
                        </div>
                    </form>

                    <p class="register-note registration-feedback" id="createPostFeedback">Aguardando liberação do editor...</p>
                </section>
            </div>
        </section>
    </main>

    <include src="footer.html"></include>
</body>
</html>
