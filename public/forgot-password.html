<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - MaxOnu 2026</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" href="/images/logo-maxonu.png" type="image/png">
    <script src="/js/includes.js?v=20260420-headerfix"></script>
</head>
<body>
    <include src="header.html"></include>

    <main class="main-content">
        <section class="content-section">
            <div class="dashboard-container">
                <section class="dashboard-hero">
                    <div class="dashboard-hero-copy">
                        <span class="dashboard-kicker">Segurança da conta</span>
                        <h1>Recuperar acesso</h1>
                        <p>Solicite um link de redefinição ou finalize a troca da senha com o token recebido.</p>
                    </div>
                    <div class="dashboard-hero-badge">Senha</div>
                </section>

                <section class="dashboard-panel security-panel password-recovery-panel">
                    <div class="dashboard-section-heading">
                        <span class="dashboard-section-kicker">Acesso seguro</span>
                        <h2>Recuperação de senha</h2>
                        <p>O token expira em 1 hora. Em ambiente de teste, o link também aparece na tela.</p>
                    </div>

                    <div class="login-tab-bar security-tab-bar" role="tablist" aria-label="Recuperação de senha">
                        <button type="button" class="login-tab is-active" data-tab-button="request">Solicitar link</button>
                        <button type="button" class="login-tab" data-tab-button="reset">Redefinir senha</button>
                    </div>

                    <div id="request-tab" data-tab-content="request">
                        <div id="request-alert" class="login-message" hidden></div>

                        <form id="request-form" class="dashboard-form">
                            <div class="form-group">
                                <label for="request-email">Email cadastrado</label>
                                <input type="email" id="request-email" name="email" placeholder="seu@email.com" required>
                            </div>
                            <div class="create-post-actions">
                                <button type="submit" class="view-button" id="request-btn">Enviar instruções</button>
                            </div>
                        </form>
                    </div>

                    <div id="reset-tab" data-tab-content="reset" hidden>
                        <div id="reset-alert" class="login-message" hidden></div>

                        <form id="reset-form" class="dashboard-form">
                            <div class="form-group">
                                <label for="reset-token">Token de recuperação</label>
                                <input type="text" id="reset-token" name="token" placeholder="Cole aqui o token recebido" required>
                            </div>
                            <div class="form-group">
                                <label for="reset-password">Nova senha</label>
                                <input type="password" id="reset-password" name="newPassword" placeholder="Mínimo de 6 caracteres" minlength="6" required>
                            </div>
                            <div class="form-group">
                                <label for="reset-confirm">Confirmar nova senha</label>
                                <input type="password" id="reset-confirm" placeholder="Repita a nova senha" minlength="6" required>
                            </div>
                            <div class="create-post-actions">
                                <button type="submit" class="view-button" id="reset-btn">Atualizar senha</button>
                            </div>
                        </form>
                    </div>

                    <p class="register-note security-back-link">
                        Lembrou a senha? <a href="/login" class="text-link">Voltar para o login</a>
                    </p>
                </section>
            </div>
        </section>
    </main>

    <include src="footer.html"></include>

    <script>
        const API_URL = '/api';

        function setAlert(containerId, message, isError = false) {
            const container = document.getElementById(containerId);
            container.hidden = false;
            container.className = `login-message ${isError ? 'is-error' : 'is-success'}`;
            container.innerHTML = message;
        }

        function clearAlert(containerId) {
            const container = document.getElementById(containerId);
            container.hidden = true;
            container.innerHTML = '';
            container.className = 'login-message';
        }

        function switchTab(tabName) {
            document.querySelectorAll('[data-tab-content]').forEach((panel) => {
                panel.hidden = panel.dataset.tabContent !== tabName;
            });

            document.querySelectorAll('[data-tab-button]').forEach((button) => {
                button.classList.toggle('is-active', button.dataset.tabButton === tabName);
            });

            clearAlert('request-alert');
            clearAlert('reset-alert');
        }

        document.querySelectorAll('[data-tab-button]').forEach((button) => {
            button.addEventListener('click', () => switchTab(button.dataset.tabButton));
        });

        document.getElementById('request-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            clearAlert('request-alert');

            const button = document.getElementById('request-btn');
            const email = document.getElementById('request-email').value.trim();
            button.disabled = true;
            button.textContent = 'Enviando...';

            try {
                const response = await fetch(`${API_URL}/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(Array.isArray(data.error) ? data.error[0]?.msg : data.error);
                }

                let message = data.message || 'Solicitação recebida com sucesso.';
                if (data.resetToken) {
                    message += `<br><br><strong>Modo teste:</strong><br><code>${data.resetToken}</code>`;
                }
                if (data.resetLink) {
                    message += `<br><br><a href="${data.resetLink}" class="text-link">Abrir link de redefinição</a>`;
                }

                setAlert('request-alert', message);
                event.target.reset();
            } catch (error) {
                setAlert('request-alert', error.message || 'Não foi possível solicitar a recuperação.', true);
            } finally {
                button.disabled = false;
                button.textContent = 'Enviar instruções';
            }
        });

        document.getElementById('reset-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            clearAlert('reset-alert');

            const token = document.getElementById('reset-token').value.trim();
            const newPassword = document.getElementById('reset-password').value;
            const confirmPassword = document.getElementById('reset-confirm').value;
            const button = document.getElementById('reset-btn');

            if (newPassword !== confirmPassword) {
                setAlert('reset-alert', 'As senhas não correspondem.', true);
                return;
            }

            button.disabled = true;
            button.textContent = 'Atualizando...';

            try {
                const response = await fetch(`${API_URL}/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(Array.isArray(data.error) ? data.error[0]?.msg : data.error);
                }

                setAlert('reset-alert', `${data.message || 'Senha atualizada com sucesso.'}<br><br>Redirecionando para o login...`);
                event.target.reset();
                setTimeout(() => {
                    window.location.href = '/login';
                }, 1400);
            } catch (error) {
                setAlert('reset-alert', error.message || 'Não foi possível redefinir a senha.', true);
            } finally {
                button.disabled = false;
                button.textContent = 'Atualizar senha';
            }
        });

        const urlParams = new URLSearchParams(window.location.search);
        const tokenFromUrl = urlParams.get('token');
        if (tokenFromUrl) {
            switchTab('reset');
            document.getElementById('reset-token').value = tokenFromUrl;
        }
    </script>
</body>
</html>
