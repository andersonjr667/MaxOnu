<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - MaxOnu 2026</title>
<link rel="stylesheet" href="/css/styles.css?v=20260428-profileenhanced1">
    <link rel="stylesheet" href="/css/profile.css?v=20260428-profileenhanced1">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="icon" href="/images/logo-maxonu.png" type="image/png">
    <script src="/js/includes.js?v=20260420-headerfix" defer></script>
    <script src="/js/profile.js?v=20260428-profileenhanced1" defer></script>
</head>
<body class="profile-page">
    <include src="header.html"></include>

    <main class="main-content profile-main" id="main-content">
        <section class="content-section profile-hero-section">
            <div class="dashboard-container">
                <section class="dashboard-hero">
                    <div class="dashboard-hero-copy">
                        <span class="dashboard-kicker">Área do Delegado</span>
                        <h1>Meu painel</h1>
                        <p>Acompanhe sua inscrição, organize sua delegação e confirme sua composição.</p>
                    </div>
                    <div class="dashboard-hero-badge">Delegado</div>
                </section>
                <div id="profileInfo" class="profile-summary-shell">
                    <p>Carregando...</p>
                </div>
            </div>
        </section>

        <section class="content-section profile-panels-section">
            <div class="dashboard-container profile-panels-grid">
                <div id="registrationPanel" class="profile-panel-shell">
                    <p>Carregando inscrição...</p>
                </div>
                <div id="delegationPanel" class="profile-panel-shell">
                    <p>Carregando delegação...</p>
                </div>
            </div>
        </section>

        <section class="content-section profile-security-section">
            <div class="dashboard-container">
                <div id="securityPanel" class="profile-panel-shell">
                    <p>Carregando segurança da conta...</p>
                </div>
            </div>
        </section>
    </main>

    <include src="footer.html"></include>
</body>
</html>
