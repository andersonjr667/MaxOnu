<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar 2FA - MaxOnu 2026</title>
    <link rel="stylesheet" href="/css/styles.css?v=20260427-profile2faemail">
    <link rel="icon" href="/images/logo-maxonu.png" type="image/png">
    <script src="/js/includes.js?v=20260420-headerfix" defer></script>
    <script src="/js/verify-2fa-login.js?v=20260427-resend2fa" defer></script>
</head>
<body class="login-page">
    <include src="header.html"></include>

    <main class="main-content">
        <section class="content-section">
            <div class="login-shell verify-login-shell">
                <section class="login-card-panel">
                    <div class="login-card-header">
                        <a href="/" class="login-brand">
                            <img src="/images/logo-maxonu.png" alt="MaxOnu 2026">
                            <div>
                                <span>Colégio Maximus</span>
                                <strong>MaxOnu 2026</strong>
                            </div>
                        </a>
                    </div>

                    <div class="login-panel-copy">
                        <h2>Verificação em duas etapas</h2>
                        <p id="verify2faIntro">Digite o código do aplicativo autenticador ou use um código de backup salvo anteriormente.</p>
                    </div>

                    <div id="messageContainer" class="login-message" hidden></div>

                    <div class="login-tab-bar" id="verifyTabBar" role="tablist" aria-label="Verificação 2FA">
                        <button type="button" class="login-tab is-active" data-verify-tab="totp">Authenticator</button>
                        <button type="button" class="login-tab" data-verify-tab="backup">Backup</button>
                    </div>

                    <section data-verify-panel="email" hidden>
                        <form id="email-form" class="auth-form">
                            <div class="form-group">
                                <label for="email-code">Código enviado por email</label>
                                <input type="text" id="email-code" placeholder="000000" inputmode="numeric" maxlength="6" pattern="[0-9]{6}" required autofocus>
                            </div>
                            <button type="submit" class="view-button auth-submit-btn">Verificar código</button>
                        </form>
                        <p class="switch-form" id="resendCodeWrap" hidden>
                            Não recebeu? 
                            <button type="button" class="text-link" id="resend2faCodeButton">Reenviar código</button>
                            <span id="resend2faCountdown"></span>
                        </p>
                    </section>

                    <section data-verify-panel="totp">
                        <form id="totp-form" class="auth-form">
                            <div class="form-group">
                                <label for="totp-code">Código de 6 dígitos</label>
                                <input type="text" id="totp-code" placeholder="000000" inputmode="numeric" maxlength="6" pattern="[0-9]{6}" required autofocus>
                            </div>
                            <button type="submit" class="view-button auth-submit-btn">Verificar código</button>
                        </form>
                    </section>

                    <section data-verify-panel="backup" hidden>
                        <form id="backup-form" class="auth-form">
                            <div class="form-group">
                                <label for="backup-code">Código de backup</label>
                                <input type="text" id="backup-code" class="backup-code-input" placeholder="Digite um código de backup" required>
                            </div>
                            <button type="submit" class="view-button auth-submit-btn">Verificar backup</button>
                        </form>
                    </section>

                    <p class="switch-form">Precisa recomeçar? <a href="/login" class="text-link" id="logout2fa">Voltar para o login</a></p>
                </section>
            </div>
        </section>
    </main>

    <include src="footer.html"></include>
</body>
</html>
